name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npx tsc --noEmit
        working-directory: site
      - run: npm run lint
        working-directory: site
      - run: npm run build
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run guards
        working-directory: site
      - run: npx playwright install --with-deps chromium
        working-directory: site
      - run: npx playwright test
        working-directory: site
      # Sid 2026-07-15 (m7plan §18.4-Q3): nightly cron is a data refresh —
      # lighthouse reports scores but only BLOCKS on real pushes. Runner
      # variance (28–36 on identical commits) must not strand the site on
      # stale GitHub data.
      - run: node scripts/lighthouse-gate.mjs
        working-directory: site
        continue-on-error: ${{ github.event_name == 'schedule' }}
      - run: node scripts/visual-gate.mjs
        working-directory: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
